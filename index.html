<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Defender: Pro Edition</title>
    <style>
        body { margin: 0; background: #050505; color: #0ff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { display: block; }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }
        
        #pauseMenu { display: none; background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(5px); }
        
        h1, h2 { text-shadow: 0 0 20px #0ff; margin-bottom: 20px; }
        h1 { font-size: 60px; }
        
        .menu-item { margin: 15px; text-align: center; }
        
        button {
            background: transparent; border: 2px solid #0ff; color: #0ff;
            padding: 12px 30px; font-size: 20px; font-family: inherit;
            cursor: pointer; transition: 0.3s; margin: 10px; min-width: 200px;
        }
        button:hover { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; }

        #resetBtn { border-color: #f0f; color: #f0f; font-size: 14px; }
        #resetBtn:hover { background: #f0f; color: #000; box-shadow: 0 0 20px #f0f; }
        
        input[type="color"] { width: 50px; height: 50px; border: none; background: transparent; cursor: pointer; vertical-align: middle; }

        #ui { 
            position: absolute; top: 20px; left: 20px; 
            width: calc(100% - 40px); display: flex; justify-content: space-between; 
            pointer-events: none; visibility: hidden;
        }
        .stat { font-size: 24px; text-shadow: 0 0 10px #0ff; }
        .hint { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 12px; color: #444; }
    </style>
</head>
<body>

    <!-- Main Menu -->
    <div id="mainMenu" class="overlay">
        <h1>NEON DEFENDER</h1>
        <div class="menu-item">
            <label>SHIP COLOR:</label>
            <input type="color" id="shipColorMain" value="#00ffff">
        </div>
        <button id="startBtn">START GAME</button>
        <button id="resetBtn">RESET HIGH SCORE</button>
    </div>

    <!-- Pause Menu -->
    <div id="pauseMenu" class="overlay">
        <h2>PAUSED</h2>
        <div class="menu-item">
            <label>CHANGE COLOR:</label>
            <input type="color" id="shipColorPause" value="#00ffff">
        </div>
        <button id="resumeBtn">RESUME</button>
        <button id="backToMainBtn" style="border-color: #ffcc00; color: #ffcc00;">MAIN MENU</button>
    </div>

    <div id="ui">
        <div class="stat">SCORE: <span id="score">0</span></div>
        <div class="stat">HIGH SCORE: <span id="highScore">0</span></div>
    </div>
    <div class="hint">PRESS ESC TO PAUSE</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mainMenu = document.getElementById('mainMenu');
        const pauseMenu = document.getElementById('pauseMenu');
        const ui = document.getElementById('ui');
        
        let score = 0, highscore = localStorage.getItem('neonDefenderHighScore') || 0;
        let gameActive = false, isPaused = false, playerColor = "#00ffff";
        
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const player = { x: canvas.width / 2, y: canvas.height - 50, size: 30 };
        let projectiles = [], enemies = [];

        function updateScores() {
            document.getElementById('score').innerText = score;
            if (score > highscore) {
                highscore = score;
                document.getElementById('highScore').innerText = highscore;
                localStorage.setItem('neonDefenderHighScore', highscore);
            }
        }

        class Enemy {
            constructor() {
                this.x = Math.random() * (canvas.width - 40) + 20;
                this.y = -50;
                this.speed = 3 + Math.random() * 4;
                this.size = 30;
            }
            update() { if (!isPaused) this.y += this.speed; }
            draw() {
                ctx.strokeStyle = '#f0f'; ctx.lineWidth = 3;
                ctx.strokeRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            }
        }

        function spawnEnemy() {
            if (gameActive && !isPaused) enemies.push(new Enemy());
            setTimeout(spawnEnemy, Math.max(150, 1000 - (score / 5)));
        }

        function animate() {
            if (!gameActive) return;
            if (!isPaused) {
                ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = playerColor;
                ctx.shadowBlur = 15; ctx.shadowColor = playerColor;
                ctx.beginPath();
                ctx.moveTo(player.x, player.y - player.size);
                ctx.lineTo(player.x - player.size, player.y + player.size);
                ctx.lineTo(player.x + player.size, player.y + player.size);
                ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;

                projectiles.forEach((p, i) => {
                    p.y -= 12;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
                    if (p.y < 0) projectiles.splice(i, 1);
                });

                enemies.forEach((e, ei) => {
                    e.update(); e.draw();
                    projectiles.forEach((p, pi) => {
                        if (Math.hypot(p.x - e.x, p.y - e.y) < 20) {
                            enemies.splice(ei, 1); projectiles.splice(pi, 1);
                            score += 10; updateScores();
                        }
                    });
                    if (e.y > canvas.height + 50) enemies.splice(ei, 1);
                });
            }
            requestAnimationFrame(animate);
        }

        // Logic
        document.getElementById('startBtn').onclick = () => {
            playerColor = document.getElementById('shipColorMain').value;
            mainMenu.style.display = 'none';
            ui.style.visibility = 'visible';
            gameActive = true; animate();
        };

        document.getElementById('resumeBtn').onclick = () => {
            playerColor = document.getElementById('shipColorPause').value;
            pauseMenu.style.display = 'none';
            isPaused = false;
        };

        document.getElementById('backToMainBtn').onclick = () => {
            location.reload(); // Simplest way to reset all states
        };

        document.getElementById('resetBtn').onclick = () => {
            if(confirm("Reset High Score?")) {
                localStorage.removeItem('neonDefenderHighScore');
                highscore = 0; document.getElementById('highScore').innerText = "0";
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && gameActive) {
                isPaused = !isPaused;
                pauseMenu.style.display = isPaused ? 'flex' : 'none';
                if (isPaused) document.getElementById('shipColorPause').value = playerColor;
            }
        });

        window.addEventListener('mousemove', (e) => { if (!isPaused) player.x = e.clientX; });
        window.addEventListener('mousedown', () => { 
            if (gameActive && !isPaused) projectiles.push({x: player.x, y: player.y}); 
        });

        document.getElementById('highScore').innerText = highscore;
        spawnEnemy();
    </script>
</body>
</html>
